<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#f5f5f5;
            text-align:center;
        }

        .top-circle{
            position:absolute;
            top:20px;
            left:20px;
            width:60px;
            height:60px;
            border-radius:50%;
            background:black;
            cursor:pointer;
        }

        h1{
            margin-top:60px;
            font-size:60px;
            letter-spacing:10px;
            text-shadow:2px 4px 6px rgba(0,0,0,0.3);
        }

        .container{
            display:flex;
            justify-content:center;
            align-items:center;
            margin-top:60px;
            gap:60px;
            flex-wrap:wrap;
        }

        .btn{
            width:300px;
            padding:40px 0;
            font-size:45px;
            font-weight:bold;
            border-radius:12px;
            color:black;
            text-decoration:none;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
            transition:0.3s;
            display:inline-block;
        }

        .send{
            background:red;
        }

        .receive{
            background:cyan;
        }

        .btn:hover{
            transform:scale(1.08);
        }

        .character{
            margin-top:30px;
        }

        .character img{
            height:380px;
        }

        @media(max-width:900px){
            h1{font-size:40px;}
            .btn{width:220px;font-size:30px;}
            .character img{height:250px;}
        }
    </style>
</head>
<body>

<!-- Top Left Circle Button -->
<div class="top-circle" onclick="goProfile()"></div>

<h1>WELCOME</h1>

<div class="container">
    <a href="send.html" class="btn send">SEND</a>
    <a href="receive.html" class="btn receive">RECEIVE</a>
</div>

<div class="character">
    <img src="https://i.imgur.com/8Km9tLL.png" alt="character">
</div>

<script>
function goProfile(){
    window.location.href = "profile.html";
}
</script>

</body>
</html>
