<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            margin:0;
            text-align:center;
        }

        .container{
            margin-top:60px;
        }

        .circle{
            width:150px;
            height:150px;
            border-radius:50%;
            background:#333;
            margin:auto;
            overflow:hidden;
            cursor:pointer;
            position:relative;
        }

        .circle img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .plus{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            font-size:60px;
            color:white;
        }

        input{
            display:none;
        }

        .info-box{
            margin-top:25px;
            background:white;
            display:inline-block;
            padding:20px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            text-align:left;
            width:300px;
        }

        .info-box p{
            margin:10px 0;
        }

        .label{
            font-weight:bold;
        }

        input.edit{
            display:block;
            width:100%;
            padding:6px;
            margin-top:5px;
        }

        .btn{
            margin-top:10px;
            padding:8px 15px;
            border:none;
            background:#28a745;
            color:white;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Profile Pic -->
    <div class="circle" onclick="chooseImage()">
        <span class="plus" id="plus">+</span>
        <img id="preview">
    </div>

    <input type="file" id="fileInput" accept="image/*" onchange="loadImage(event)">

    <!-- INFO -->
    <div class="info-box">

        <p><span class="label">SCS No:</span> <span id="scs"></span></p>

        <p><span class="label">Username:</span></p>
        <input class="edit" id="username">

        <p><span class="label">Display Name:</span></p>
        <input class="edit" id="display">

        <button class="btn" onclick="saveData()">Save Changes</button>

    </div>

</div>

<script>

let user = localStorage.getItem("currentUser");

function chooseImage(){
    document.getElementById("fileInput").click();
}

function loadImage(event){
    let img = document.getElementById("preview");
    img.src = URL.createObjectURL(event.target.files[0]);
    document.getElementById("plus").style.display="none";

    localStorage.setItem(user+"_pic", img.src);
}

// Load data
window.onload = function(){

    document.getElementById("scs").innerText = user;

    let uname = localStorage.getItem(user+"_username") || user;
    let dname = localStorage.getItem(user+"_display") || "User " + user;

    document.getElementById("username").value = uname;
    document.getElementById("display").value = dname;

    let pic = localStorage.getItem(user+"_pic");
    if(pic){
        document.getElementById("preview").src = pic;
        document.getElementById("plus").style.display="none";
    }
}

function saveData(){
    let uname = document.getElementById("username").value;
    let dname = document.getElementById("display").value;

    localStorage.setItem(user+"_username", uname);
    localStorage.setItem(user+"_display", dname);

    alert("Profile Updated Successfully ✅");
}

</script>

</body>
</html>
