<!DOCTYPE html>
<html>
<head>
    <title>Send Notes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            font-family: Arial;
            margin:0;
            background:#e9e9e9;
            text-align:center;
        }

        h2{ margin-top:20px; }

        .box{
            width:320px;
            margin:20px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        .upload{
            width:80px;
            height:80px;
            border-radius:50%;
            background:#333;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:35px;
            margin:15px auto;
            cursor:pointer;
        }

        button{
            padding:10px;
            width:100%;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        .msg{
            margin-top:10px;
        }
    </style>
</head>

<body>

<h2>SEND NOTES</h2>

<div class="box">

    <input type="text" id="class" placeholder="Enter Class">
    <input type="text" id="subject" placeholder="Enter Subject">
    <input type="text" id="title" placeholder="Enter Title">

    <div class="upload" id="uploadBtn" onclick="chooseFile()">+</div>
    <input type="file" id="file" style="display:none" onchange="fileSelected(event)">

    <button onclick="saveNotes()">Send Notes</button>

    <div class="msg" id="msg"></div>

</div>

<script>

let fileData = null;

function chooseFile(){
    document.getElementById("file").click();
}

function fileSelected(e){
    fileData = e.target.files[0];

    document.getElementById("uploadBtn").innerText = "✔";
    document.getElementById("uploadBtn").style.background = "green";
}

function saveNotes(){

    let cls = document.getElementById("class").value;
    let sub = document.getElementById("subject").value;
    let title = document.getElementById("title").value;

    if(cls=="" || sub=="" || title=="" || !fileData){
        document.getElementById("msg").innerText = "Enter all details";
        document.getElementById("msg").style.color = "red";
        return;
    }

    let user = localStorage.getItem("currentUser");

    let data = {
        class: cls,
        subject: sub,
        title: title,
        fileName: fileData.name,
        fileURL: URL.createObjectURL(fileData),
        user: user
    };

    localStorage.setItem("notes_" + Date.now(), JSON.stringify(data));

    document.getElementById("msg").innerText = "Notes successfully saved";
    document.getElementById("msg").style.color = "green";

    document.getElementById("class").value="";
    document.getElementById("subject").value="";
    document.getElementById("title").value="";
    fileData=null;

    document.getElementById("uploadBtn").innerText = "+";
    document.getElementById("uploadBtn").style.background = "#333";
}

</script>

</body>
</html>
