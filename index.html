<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f2f2f2;
            margin:0;
            padding:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .login-box{
            background:white;
            padding:40px;
            width:320px;
            border-radius:8px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            text-align:center;
        }
        input{
            width:100%;
            padding:12px;
            margin:12px 0;
            border:1px solid #ccc;
            border-radius:4px;
        }
        button{
            padding:12px 25px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:4px;
            cursor:pointer;
        }
        button:hover{
            background:#45a049;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Enter your SCS number">
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="login()">Login</button>
</div>

<script>
function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user !== "" && pass !== ""){
        localStorage.setItem("currentUser", user);
        window.location.href = "dashboard.html";
    } else {
        alert("Please enter details");
    }
}
</script>

</body>
</html>
